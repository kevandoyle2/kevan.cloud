    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg:        #0F1117;
        --surface:   #181B24;
        --text:      #E8E6E1;
        --muted:     #7A7D88;
        --accent:    #F5A623;
        --accent-dim:#3D2E0E;
        --radius:    12px;
      }

      html, body {
        height: 100%;
        background-color: transparent;
      }

      body {
        background-color: transparent;
        color: var(--text);
        font-family: 'Inter', system-ui, sans-serif;
        font-weight: 300;
        line-height: 1.7;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      /* ── Video background ── */
      .bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
        transition: opacity 0.05s;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: -1;
      }

      /* ── Card ── */
      .card {
        background: rgba(24, 27, 36, 0.72);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: var(--radius);
        max-width: 480px;
        width: 100%;
        padding: 3rem 2.5rem 2.5rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      /* ── Hero photo ── */
      .hero {
        display: flex;
        justify-content: center;
      }

      .photo-wrap {
        position: relative;
        width: 120px;
        height: 120px;
      }

      .photo-wrap::before {
        content: '';
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(245,166,35,0.25) 0%, transparent 70%);
        animation: pulse 4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.08); }
      }

      @media (prefers-reduced-motion: reduce) {
        .photo-wrap::before { animation: none; opacity: 0.6; }
      }

      .photo-wrap img {
        position: relative;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(245,166,35,0.4);
        display: block;
      }

      /* ── Copy ── */
      .copy h1 {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: clamp(1.6rem, 4vw, 2rem);
        font-weight: 400;
        letter-spacing: -0.01em;
        margin-bottom: 1rem;
        color: var(--text);
      }

      .copy p {
        color: #BDBBB5;
        font-size: 0.95rem;
        margin-bottom: 0.6rem;
      }

      .copy p:last-of-type {
        margin-bottom: 0;
      }

      /* ── Links ── */
      a {
        color: var(--accent);
        text-decoration: none;
        transition: opacity 0.15s;
      }

      a:hover {
        opacity: 0.75;
      }

      a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 2px;
      }

      /* ── CTA row ── */
      .cta {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.4rem;
      }

      .cta a {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.45rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        border: 1px solid var(--accent);
        color: var(--accent);
        background: transparent;
        transition: background 0.15s, color 0.15s;
      }

      .cta a:hover {
        background: var(--accent);
        color: #000;
        opacity: 1;
      }

      /* ── Divider ── */
      .divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.07);
      }

      /* ── Social icons ── */
      .socials {
        display: flex;
        gap: 1.25rem;
        align-items: center;
      }

      .socials a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: rgba(255,255,255,0.05);
        color: var(--muted);
        transition: background 0.15s, color 0.15s, transform 0.15s;
      }

      .socials a:hover {
        background: var(--accent-dim);
        color: var(--accent);
        transform: translateY(-2px);
        opacity: 1;
      }

      .socials svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        .card { padding: 2rem 1.5rem; }
      }
    </style>
  </head>

  <body>
    <!-- Two videos for seamless looping -->
    <video class="bg-video" id="vid1" autoplay muted playsinline poster="images/FullSizeRender.jpg">

    </video>
    <video class="bg-video" id="vid2" muted playsinline style="opacity:0;">

    </video>

    <script>
      (function () {
        var v1 = document.getElementById('vid1');
        var v2 = document.getElementById('vid2');
        var started = false;

        v2.load();

        function swap(incoming, outgoing, reattach) {
          incoming.currentTime = 0;
          incoming.play().catch(function(){});
          incoming.style.opacity = '1';
          outgoing.style.opacity = '0';
          reattach();
        }

        function attachV1() {
          v1.addEventListener('timeupdate', function onV1() {
            if (v1.duration && v1.currentTime >= v1.duration - 0.3) {
              v1.removeEventListener('timeupdate', onV1);
              swap(v2, v1, attachV2);
            }
          });
        }

        function attachV2() {
          v2.addEventListener('timeupdate', function onV2() {
            if (v2.duration && v2.currentTime >= v2.duration - 0.3) {
              v2.removeEventListener('timeupdate', onV2);
              swap(v1, v2, attachV1);
            }
          });
        }

        function startPlayback() {
          if (started) return;
          started = true;
          v1.play().then(function() {
            attachV1();
          }).catch(function(){});
        }

        // Try autoplay first
        v1.play().then(function() {
          started = true;
          attachV1();
        }).catch(function() {
          // Autoplay blocked — start on first user interaction
          document.addEventListener('click', startPlayback, { once: true });
          document.addEventListener('keydown', startPlayback, { once: true });
          document.addEventListener('touchstart', startPlayback, { once: true });
          document.addEventListener('mousemove', startPlayback, { once: true });
        });
      })();
    </script>
